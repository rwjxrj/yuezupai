spring:
  profiles:
    active: dev   # 默认开发环境，部署时改成 prod

  # JSON 序列化
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null  # null字段不返回

  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

# MyBatis-Plus
mybatis-plus:
  configuration:
    # 开启驼峰映射 user_id -> userId
    map-underscore-to-camel-case: true
    # 开发阶段打印SQL（生产关掉）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键自增
      id-type: auto
      # 逻辑删除（预留，目前表里没加，后期需要再开）
      # logic-delete-field: isDeleted
      # logic-delete-value: 1
      # logic-not-delete-value: 0

# ==================== 自定义配置 ====================

# JWT 配置
jwt:
  secret: YueZhuPai2024SecretKeyForJWTTokenGenerationMustBeLongEnough!!
  expiration: 604800  # 7天，单位秒

# 微信小程序配置
wechat:
  appid: your_appid_here
  secret: your_secret_here

# 文件存储配置
file:
  storage: local    # local-本地存储, oss-阿里云OSS（后期切换）
  local:
    path: /data/upload/                          # 服务器存储路径
    url-prefix: https://yourdomain.com/upload/   # 访问前缀(Nginx代理)