server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/yuezupai?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false
    username: yuezupai
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password: your_redis_password
      database: 0

# 生产环境关闭SQL日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

file:
  local:
    path: /data/upload/
    url-prefix: https://yourdomain.com/upload/